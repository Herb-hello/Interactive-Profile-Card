<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Profile Card</title>
    <link href="styles.css" rel="stylesheet" />
    <script scr="script.js" defer></script>
  </head>
  <body>
    <article class="profile-card">
      <header>
        <h1>Kylie Seto</h1>
        <div class="headshot">
          <img src="JDC Headshot.jpg" />
        </div>
        <p>
          Hello! I am a 4th year business student studying Management
          Information Systems (MIS) with a minor in Computer Science at Simon
          Fraser Univeristy (SFU) located in Vancouver, BC, Canada.
        </p>
        <button id="btn-lm">Learn More!</button>
      </header>
      <section class="hidden-info" id="hidden-info">
        <p><strong>Hobbies: </strong>Hiking, backpacking, bouldering</p>
        <p><strong>Currently Learning: </strong>Web development</p>
      </section>
    </article>
  </body>
</html>
